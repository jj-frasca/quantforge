name: CI

on:
  push:
    branches: [master]
  pull_request:

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend lint + tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Sync dependencies (Python pinned via .python-version)
        working-directory: backend
        run: uv sync

      - name: Lint (ruff + mypy strict)
        run: make lint

      # Synthetic fixtures only. Live-data tests (@pytest.mark.live) and DB integration
      # tests (@pytest.mark.integration) are excluded from CI by design — they run locally
      # via `make test-live` / `make test-integration`. (ARCHITECTURE.md §0.5, ADR-009)
      - name: Test + coverage gate (>=85%)
        run: make test

  frontend:
    name: Frontend lint + tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint (eslint) + typecheck (tsc)
        run: npm run lint && npm run typecheck

      - name: Test + coverage gate (>=75%)
        run: npm run coverage
