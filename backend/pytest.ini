[pytest]
testpaths = tests
pythonpath = .
asyncio_mode = auto
addopts = --strict-markers --strict-config -ra

# Markers. `live` hits real external APIs (e.g. yfinance) — non-deterministic and
# rate-limited, so it is EXCLUDED from CI (`make test` runs -m "not live").
# Run it locally with `make test-live`. See ARCHITECTURE.md §0.5 (CI gating).
markers =
    live: test depends on a live external data source (run locally via `make test-live`)
    integration: spans multiple components / requires services (DB, Redis)
    e2e: full end-to-end flow
