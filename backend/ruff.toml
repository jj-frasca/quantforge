target-version = "py312"
line-length = 100
src = ["app", "tests"]

[lint]
select = [
    "E", "W",   # pycodestyle
    "F",        # pyflakes
    "I",        # isort
    "UP",       # pyupgrade
    "B",        # flake8-bugbear
    "C4",       # flake8-comprehensions
    "SIM",      # flake8-simplify
    "RUF",      # ruff-specific
]
ignore = [
    "E501",  # line length handled by the formatter
]

[lint.isort]
known-first-party = ["app"]

[lint.per-file-ignores]
# Tests may use assert and module-level fixtures freely.
"tests/**/*.py" = ["B011", "S101"]

[format]
quote-style = "double"
indent-style = "space"
